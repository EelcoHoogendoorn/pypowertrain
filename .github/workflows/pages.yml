name: Deploy browser app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "pypowertrain/**"
      - "pyproject.toml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# allow this workflow to publish a Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# one deployment at a time; don't cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shinylive tooling
        run: pip install shinylive shiny shinywidgets

      - name: Build static site
        run: bash webapp/build.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
